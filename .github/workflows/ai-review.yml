# Drop into your repo at .github/workflows/ai-review.yml.
# Posts a signed webhook to the AI Review Runner on:
#   1. PR opened — automatic first review.
#   2. A trusted user posts `/code-review` in a PR comment — re-trigger
#      against the current head_sha.
#
# Required secrets in the repo (or org):
#   RUNNER_HMAC_SECRET   — same value the runner has at RUNNER_HMAC_SECRET / _FILE.
#   RUNNER_URL           — e.g. https://runner.example.com/review
#   RUNNER_GH_PAT        — fine-grained PAT with `Contents: Read`,
#                          `Pull requests: Read & Write`, `Issues: Read & Write`,
#                          `Metadata: Read`. See README / DEPLOY.md for why
#                          GITHUB_TOKEN won't work: the runner processes jobs
#                          asynchronously, but the built-in GITHUB_TOKEN is
#                          revoked the moment this workflow job finishes
#                          (~2 s after the POST), while the runner still needs
#                          the token 30–180 s later to clone and post.
#
# Edit the `TRUSTED_USERS` list below to control who can re-trigger via comment.

name: AI Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  ai-review:
    # Trigger on:
    #   - PR opened (automatic first review)
    #   - issue_comment on a PR, by a TRUSTED user, containing `/code-review`
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.sender.type != 'Bot' &&
       contains(fromJSON('["lee-to"]'), github.event.sender.login) &&
       contains(github.event.comment.body, '/code-review'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send signed webhook
        env:
          RUNNER_URL: ${{ secrets.RUNNER_URL }}
          RUNNER_HMAC_SECRET: ${{ secrets.RUNNER_HMAC_SECRET }}
          # PAT, NOT secrets.GITHUB_TOKEN — that one expires when the job
          # finishes, but the runner needs the token 30–180 s later.
          GH_TOKEN: ${{ secrets.RUNNER_GH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"

          # PR number + head_sha differ between event types.
          # `pull_request`  → both come straight from the event payload.
          # `issue_comment` → only `issue.number` is available; fetch head_sha
          #                   for the *latest* commit via gh so each /code-review
          #                   reviews the freshest code.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
            HEAD_SHA=$(gh pr view "${PR_NUMBER}" \
                --repo "${REPO}" \
                --json headRefOid -q .headRefOid)
          fi

          TS="$(date +%s)"

          # Build payload — keep this single-line JSON; the runner verifies HMAC over
          # `<ts>.<rawBody>` byte-for-byte.
          BODY="$(jq -nc \
            --arg repo "${REPO}" \
            --argjson pr ${PR_NUMBER} \
            --arg sha "${HEAD_SHA}" \
            --arg tok "${GH_TOKEN}" \
            --argjson ts ${TS} \
            '{repo: $repo, pr_number: $pr, head_sha: $sha, gh_token: $tok, ts: $ts}')"

          # X-Signature = sha256= + HMAC( "<ts>." + BODY )
          SIG="sha256=$(printf '%s.%s' "${TS}" "${BODY}" \
            | openssl dgst -sha256 -hmac "${RUNNER_HMAC_SECRET}" -hex \
            | awk '{print $2}')"

          # POST and capture status; fail the workflow on >= 400 from the runner.
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "${RUNNER_URL}" \
              -H "Content-Type: application/json" \
              -H "X-Signature: ${SIG}" \
              -H "X-Timestamp: ${TS}" \
              --data-raw "${BODY}")
          echo "runner http: ${HTTP_CODE}"
          cat /tmp/resp.json || true
          if [ "${HTTP_CODE}" -ge 400 ]; then
              echo "::error::Runner returned ${HTTP_CODE}"
              exit 1
          fi
